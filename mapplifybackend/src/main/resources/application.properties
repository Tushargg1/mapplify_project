server.port=${PORT:8081}

# Allowed CORS/WebSocket origins — add your Vercel frontend URL here
mapplify.allowed.origins=${ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
spring.main.allow-bean-definition-overriding=true

# Database config — supports both:
#   Option A: Railway auto-injected vars (MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD)
#   Option B: Manual MAPPLIFY_DB_URL (full JDBC URL)
spring.datasource.url=${MAPPLIFY_DB_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:mapplify}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MAPPLIFY_DB_USER:${MYSQLUSER:root}}
spring.datasource.password=${MAPPLIFY_DB_PASSWORD:${MYSQLPASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# External API keys — set via environment variables on Railway
google.maps.api.key=${GOOGLE_MAPS_SERVER_API_KEY:}
google.tts.api.key=${GOOGLE_TTS_API_KEY:${google.maps.api.key}}
groq.api.key=${GROQ_API_KEY:}

logging.level.org.springframework.web.socket=INFO
logging.level.org.springframework.messaging=INFO
