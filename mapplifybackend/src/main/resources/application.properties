server.port=${PORT:8081}

# Allowed CORS/WebSocket origins — add your Vercel frontend URL here
mapplify.allowed.origins=${ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
spring.main.allow-bean-definition-overriding=true

# Database — Railway MySQL provides these env vars automatically
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:mapplify}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# External API keys — set via environment variables on Railway
google.maps.api.key=${GOOGLE_MAPS_SERVER_API_KEY:}
google.tts.api.key=${GOOGLE_TTS_API_KEY:${google.maps.api.key}}
groq.api.key=${GROQ_API_KEY:}

logging.level.org.springframework.web.socket=INFO
logging.level.org.springframework.messaging=INFO
